name: beecoolmobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  animate_do: ^3.3.4
  flutter_svg: ^2.0.9
  dio: ^5.8.0
  shared_preferences: ^2.5.5
  mobile_scanner: ^5.1.0
  awesome_snackbar_content: ^0.1.3
  another_flushbar: ^1.0.2
  add_2_calendar: ^3.0.1
  stomp_dart_client: ^3.0.1
  flutter_stripe: ^13.0.0
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  # Pour Android : Configuration de l'icône adaptative (évite le contour blanc)
  # Remplacez par la couleur de fond exacte de votre logo (ex: #0C1726 pour bleu foncé, #FC9910 pour orange, #FFFFFF pour blanc)
  adaptive_icon_background: "#0C1726"
  adaptive_icon_foreground: "assets/images/logo.png"
  # Pour iOS : Évite les soucis de transparence sur iPhone
  remove_alpha_ios: true